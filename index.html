<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="first-half">
        <div></div>
        <div class="logo-container">
            <img src="img/odin-logo.png" alt="odin-logo">
            <p>ODIN</p>
        </div>
        <div>
            <p>
                Photo by <a href="https://unsplash.com/@oscartothekeys">Oscar Keys</a> on <a
                    href="https://unsplash.com/photos/time-lapse-photography-of-sea-wave-10sTDZAj5sA">Unsplash</a>
            </p>
        </div>
    </div>
    <div class="second-half">
        <div>
            <p>This is not a real online service! You know you need something like this in your life to help you realize
                your deepest dreams. Sign up now to get started.</p>
            <p>You know you want to.</p>
        </div>
        <form action="">
            <div>
                <p>Let's do this!</p>
                <div>
                    <label for="first-name">FIRST NAME
                        <input type="text" name="first-name" id="first-name">
                    </label>
                    <label for="last-name">LAST NAME
                        <input type="text" name="last-name" id="last-name">
                    </label>
                    <label for="email">EMAIL
                        <input type="email" name="email" id="email">
                    </label>
                    <label for="phone-number">PHONE NUMBER
                        <input type="tel" name="phone-number" id="phone-number">
                    </label>
                    <label for="password">PASSWORD
                        <input type="password" name="password" id="password">
                    </label>
                    <label for="password">CONFIRM PASSWORD
                        <input type="password" name="password" id="password">
                    </label>
                </div>
            </div>
            <div>
                <button>Create Account</button>
            </div>
        </form>
        <p>Already have an account? <a href="">Log in</a></p>
    </div>
</body>

</html>
